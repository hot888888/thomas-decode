<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托马斯解码系统</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        textarea { width: 100%; height: 150px; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin: 10px 0; }
        .result { background: white; padding: 15px; border-radius: 5px; margin-top: 10px; }
        .number { display: inline-block; width: 40px; height: 40px; line-height: 40px; text-align: center; background: #007bff; color: white; border-radius: 50%; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🐴 托马斯解码系统</h1>
    <textarea id="poem" placeholder="请在此输入托马斯诗句..."></textarea>
    <button onclick="decode()">🔍 开始解码</button>
    <div id="result"></div>

    <script>
        const wordMap = {
            "中秋": [8, 15], "重阳": [9, 1], "四季": [4, 12], "三更": [3],
            "归一": [1], "六合": [6, 15, 24, 33, 42],
            "红波": [1,2,7,8,12,13,18,19,23,24,29,30,34,35,40,45,46],
            "蓝波": [3,4,9,10,14,15,20,25,26,31,36,37,41,42,47,48],
            "绿波": [5,6,11,16,17,21,22,27,28,32,33,38,39,43,44,49],
            "虎": [4,16,28,40], "龙": [2,14,26,38], "兔": [3,15,27,39],
            "猪": [7,19,31,43], "狗": [8,20,32,44], "鸡": [9,21,33,45],
            "猴": [10,22,34,46], "羊": [11,23,35,47], "马": [12,24,36,48],
            "牛": [5,17,29,41], "鼠": [6,18,30,42], "蛇": [1,13,25,37,49]
        };

        function decode() {
            const poem = document.getElementById("poem").value;
            let numbers = [];
            let matched = [];

            for (const [word, nums] of Object.entries(wordMap)) {
                if (poem.includes(word)) {
                    numbers = numbers.concat(nums);
                    matched.push(`触发词：${word} → 数字：[${nums.join(', ')}]`);
                }
            }

            numbers = [...new Set(numbers)].sort((a, b) => a - b);

            let html = `<div class="result">`;
            html += `<p><strong>诗句：</strong>${poem}</p>`;
            html += `<p><strong>触发线索：</strong></p><ul>`;
            matched.forEach(m => html += `<li>${m}</li>`);
            html += `</ul>`;
            html += `<p><strong>候选数字（共${numbers.length}个）：</strong></p>`;
            numbers.forEach(n => html += `<span class="number">${n}</span>`);
            html += `</div>`;

            document.getElementById("result").innerHTML = html;
        }
    </script>
</body>
</html>
